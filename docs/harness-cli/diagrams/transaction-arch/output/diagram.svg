<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
  </style>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
  </pattern>
  <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#0891b2"/>
  </marker>
  <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
  </marker>
  <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
  </marker>
  <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
  </marker>
  <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
  </marker>
  <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#e11d48"/>
  </marker>
</defs>

<!-- Background -->
<rect width="100%" height="100%" fill="#fafafa"/>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- Title -->
<text x="30" y="35" fill="#0891b2" font-size="18" font-weight="700">transaction 三仓 + 快慢双轨工程架构</text>
<text x="30" y="55" fill="#64748b" font-size="10">harness-as-code · Android 复用 KMP / iOS 独立 ObjC</text>

<!-- 快轨 region (orange dashed) -->
<rect x="60" y="280" width="1080" height="320" rx="12" fill="rgba(255,237,213,0.3)" stroke="#ea580c" stroke-width="1.2" stroke-dasharray="12,4"/>
<text x="80" y="305" fill="#ea580c" font-size="13" font-weight="700">⚡ 快轨 (Fast Track)</text>
<text x="240" y="305" fill="#64748b" font-size="10">Agent 全自动跑工作流 · 持续沉淀新 spec 回 harness</text>

<!-- 慢轨 region (emerald dashed) -->
<rect x="60" y="660" width="1080" height="240" rx="12" fill="rgba(209,250,229,0.3)" stroke="#059669" stroke-width="1.2" stroke-dasharray="12,4"/>
<text x="80" y="685" fill="#059669" font-size="13" font-weight="700">🛡 慢轨 (Slow Track)</text>
<text x="220" y="685" fill="#64748b" font-size="10">仅承载通过质量门的稳定 spec / 业务代码 · 直通 release</text>

<!-- 质量门 dashed separator -->
<line x1="200" y1="630" x2="450" y2="630" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="6,4"/>
<line x1="750" y1="630" x2="1000" y2="630" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="6,4"/>
<rect x="450" y="615" width="300" height="30" rx="6" fill="#fafafa"/>
<rect x="450" y="615" width="300" height="30" rx="6" fill="rgba(255,228,230,0.7)" stroke="#e11d48" stroke-width="1.5"/>
<text x="600" y="635" fill="#1e293b" font-size="10" font-weight="600" text-anchor="middle">质量门 · reviewer Critical=0 + 用户 approve</text>

<!-- harness-cli (Bootstrap 工具) at top-left -->
<rect x="80" y="80" width="200" height="130" rx="10" fill="#fafafa"/>
<rect x="80" y="80" width="200" height="130" rx="10" fill="rgba(255,228,230,0.5)" stroke="#e11d48" stroke-width="2"/>
<text x="180" y="108" fill="#1e293b" font-size="13" font-weight="700" text-anchor="middle">harness-cli</text>
<text x="180" y="125" fill="#64748b" font-size="9" text-anchor="middle">Bootstrap 工具 · 通用 CLI</text>
<line x1="100" y1="138" x2="260" y2="138" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="3,2"/>
<text x="180" y="156" fill="#1e293b" font-size="10" text-anchor="middle">harness init</text>
<text x="180" y="172" fill="#1e293b" font-size="10" text-anchor="middle">harness sync · diff</text>
<text x="180" y="188" fill="#1e293b" font-size="10" text-anchor="middle">harness adopt · eval</text>
<text x="180" y="204" fill="#64748b" font-size="9" text-anchor="middle">（生成 / 维护 spec 仓）</text>

<!-- transaction_harness (Spec 工程) at top-right -->
<rect x="320" y="80" width="580" height="130" rx="10" fill="#fafafa"/>
<rect x="320" y="80" width="580" height="130" rx="10" fill="rgba(237,233,254,0.6)" stroke="#7c3aed" stroke-width="2"/>
<text x="610" y="108" fill="#1e293b" font-size="14" font-weight="700" text-anchor="middle">transaction_harness</text>
<text x="610" y="125" fill="#64748b" font-size="9" text-anchor="middle">Spec 工程 · 沉淀 agent / skill / rule / doc / mcp / hook 全套</text>

<!-- 6 tags -->
<rect x="340" y="148" width="80" height="40" rx="4" fill="rgba(207,250,254,0.7)" stroke="#0891b2" stroke-width="1"/>
<text x="380" y="172" fill="#1e293b" font-size="10" font-weight="600" text-anchor="middle">agents</text>

<rect x="430" y="148" width="80" height="40" rx="4" fill="rgba(207,250,254,0.7)" stroke="#0891b2" stroke-width="1"/>
<text x="470" y="172" fill="#1e293b" font-size="10" font-weight="600" text-anchor="middle">skills</text>

<rect x="520" y="148" width="80" height="40" rx="4" fill="rgba(207,250,254,0.7)" stroke="#0891b2" stroke-width="1"/>
<text x="560" y="172" fill="#1e293b" font-size="10" font-weight="600" text-anchor="middle">rules</text>

<rect x="610" y="148" width="80" height="40" rx="4" fill="rgba(207,250,254,0.7)" stroke="#0891b2" stroke-width="1"/>
<text x="650" y="172" fill="#1e293b" font-size="10" font-weight="600" text-anchor="middle">docs / ADR</text>

<rect x="700" y="148" width="80" height="40" rx="4" fill="rgba(207,250,254,0.7)" stroke="#0891b2" stroke-width="1"/>
<text x="740" y="172" fill="#1e293b" font-size="10" font-weight="600" text-anchor="middle">mcp</text>

<rect x="790" y="148" width="80" height="40" rx="4" fill="rgba(207,250,254,0.7)" stroke="#0891b2" stroke-width="1"/>
<text x="830" y="172" fill="#1e293b" font-size="10" font-weight="600" text-anchor="middle">hooks</text>

<!-- 快轨 components -->
<!-- Coding Agent (highlight blue) -->
<rect x="460" y="350" width="280" height="74" rx="6" fill="#fafafa"/>
<rect x="460" y="350" width="280" height="74" rx="6" fill="rgba(219,234,254,0.7)" stroke="#2563eb" stroke-width="1.5"/>
<text x="600" y="376" fill="#1e293b" font-size="12" font-weight="700" text-anchor="middle">CC / Codex Coding Agent</text>
<text x="600" y="394" fill="#64748b" font-size="9" text-anchor="middle">加载 harness spec → 跑 10 Phase 工作流</text>
<text x="600" y="410" fill="#64748b" font-size="9" text-anchor="middle">需求 → 设计 → 编码 → 测试 → 沉淀</text>

<!-- transaction_android feat (primary cyan) -->
<rect x="120" y="480" width="320" height="100" rx="6" fill="#fafafa"/>
<rect x="120" y="480" width="320" height="100" rx="6" fill="rgba(207,250,254,0.7)" stroke="#0891b2" stroke-width="1.5"/>
<text x="280" y="506" fill="#1e293b" font-size="12" font-weight="700" text-anchor="middle">transaction_android</text>
<text x="280" y="524" fill="#64748b" font-size="9" text-anchor="middle">feat-* 分支 · 频繁迭代</text>
<text x="280" y="544" fill="#1e293b" font-size="10" text-anchor="middle">Kotlin（复用 KMP commonMain）</text>
<text x="280" y="562" fill="#64748b" font-size="9" text-anchor="middle">+ Compose UI / Paparazzi 截图</text>

<!-- transaction_ios feat (accent amber) -->
<rect x="760" y="480" width="320" height="100" rx="6" fill="#fafafa"/>
<rect x="760" y="480" width="320" height="100" rx="6" fill="rgba(254,243,199,0.7)" stroke="#d97706" stroke-width="1.5"/>
<text x="920" y="506" fill="#1e293b" font-size="12" font-weight="700" text-anchor="middle">transaction_ios</text>
<text x="920" y="524" fill="#64748b" font-size="9" text-anchor="middle">feat-* 分支 · 频繁迭代</text>
<text x="920" y="544" fill="#1e293b" font-size="10" text-anchor="middle">Objective-C（独立实现）</text>
<text x="920" y="562" fill="#64748b" font-size="9" text-anchor="middle">+ UIKit / SLK 前缀</text>

<!-- 慢轨 components -->
<!-- transaction_android main -->
<rect x="120" y="730" width="320" height="100" rx="6" fill="#fafafa"/>
<rect x="120" y="730" width="320" height="100" rx="6" fill="rgba(207,250,254,0.7)" stroke="#0891b2" stroke-width="1.5"/>
<text x="280" y="756" fill="#1e293b" font-size="12" font-weight="700" text-anchor="middle">transaction_android</text>
<text x="280" y="774" fill="#059669" font-size="9" font-weight="600" text-anchor="middle">main 分支 · 仅承载质量通过的代码</text>
<text x="280" y="800" fill="#1e293b" font-size="10" text-anchor="middle">PR review approve + Critical=0</text>

<!-- transaction_ios main -->
<rect x="760" y="730" width="320" height="100" rx="6" fill="#fafafa"/>
<rect x="760" y="730" width="320" height="100" rx="6" fill="rgba(254,243,199,0.7)" stroke="#d97706" stroke-width="1.5"/>
<text x="920" y="756" fill="#1e293b" font-size="12" font-weight="700" text-anchor="middle">transaction_ios</text>
<text x="920" y="774" fill="#059669" font-size="9" font-weight="600" text-anchor="middle">main 分支 · 仅承载质量通过的代码</text>
<text x="920" y="800" fill="#1e293b" font-size="10" text-anchor="middle">PR review approve + Critical=0</text>

<!-- Arrows -->
<!-- harness-cli → transaction_harness (generate) -->
<path d="M 280,145 L 320,145" fill="none" stroke="#e11d48" stroke-width="1.8" marker-end="url(#arrow-rose)"/>
<text x="300" y="138" fill="#e11d48" font-size="9" font-weight="600" text-anchor="middle">生成</text>

<!-- harness → Coding Agent (load spec) -->
<path d="M 580,210 L 580,350" fill="none" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#arrow-violet)"/>
<rect x="495" y="270" width="80" height="20" rx="3" fill="#fafafa"/>
<text x="535" y="284" fill="#7c3aed" font-size="9" text-anchor="middle">load spec</text>

<!-- Coding Agent → harness (沉淀，反向虚线) -->
<path d="M 620,350 L 620,210" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
<rect x="625" y="270" width="100" height="20" rx="3" fill="#fafafa"/>
<text x="675" y="284" fill="#ea580c" font-size="9" text-anchor="middle">沉淀新 spec</text>

<!-- Coding Agent → android-feat (生成代码) -->
<path d="M 510,424 L 350,480" fill="none" stroke="#0891b2" stroke-width="1.8" marker-end="url(#arrow-cyan)"/>
<rect x="380" y="445" width="100" height="18" rx="3" fill="#fafafa"/>
<text x="430" y="458" fill="#0891b2" font-size="9" text-anchor="middle">生成 Kotlin</text>

<!-- Coding Agent → ios-feat (生成代码) -->
<path d="M 690,424 L 850,480" fill="none" stroke="#d97706" stroke-width="1.8" marker-end="url(#arrow-amber)"/>
<rect x="720" y="445" width="100" height="18" rx="3" fill="#fafafa"/>
<text x="770" y="458" fill="#d97706" font-size="9" text-anchor="middle">生成 ObjC</text>

<!-- 跨轨：android feat → main (PR merge) -->
<path d="M 280,580 L 280,730" fill="none" stroke="#059669" stroke-width="1.8" marker-end="url(#arrow-emerald)"/>
<rect x="220" y="650" width="120" height="20" rx="3" fill="#fafafa"/>
<text x="280" y="664" fill="#059669" font-size="9" font-weight="600" text-anchor="middle">PR merge → main</text>

<!-- 跨轨：ios feat → main (PR merge) -->
<path d="M 920,580 L 920,730" fill="none" stroke="#059669" stroke-width="1.8" marker-end="url(#arrow-emerald)"/>
<rect x="860" y="650" width="120" height="20" rx="3" fill="#fafafa"/>
<text x="920" y="664" fill="#059669" font-size="9" font-weight="600" text-anchor="middle">PR merge → main</text>

<!-- Legend -->
<rect x="60" y="912" width="1080" height="32" rx="4" fill="#fafafa"/>
<rect x="60" y="912" width="1080" height="32" rx="4" fill="rgba(241,245,249,0.8)" stroke="#94a3b8" stroke-width="1"/>
<text x="80" y="932" fill="#1e293b" font-size="9" font-weight="700">Legend:</text>
<rect x="138" y="922" width="14" height="12" rx="2" fill="rgba(255,228,230,0.5)" stroke="#e11d48" stroke-width="1.2"/>
<text x="158" y="932" fill="#64748b" font-size="9">harness-cli</text>
<rect x="225" y="922" width="14" height="12" rx="2" fill="rgba(237,233,254,0.6)" stroke="#7c3aed" stroke-width="1.2"/>
<text x="245" y="932" fill="#64748b" font-size="9">Spec 工程</text>
<rect x="312" y="922" width="14" height="12" rx="2" fill="rgba(219,234,254,0.7)" stroke="#2563eb" stroke-width="1.2"/>
<text x="332" y="932" fill="#64748b" font-size="9">Agent</text>
<rect x="382" y="922" width="14" height="12" rx="2" fill="rgba(207,250,254,0.7)" stroke="#0891b2" stroke-width="1.2"/>
<text x="402" y="932" fill="#64748b" font-size="9">Android 仓</text>
<rect x="472" y="922" width="14" height="12" rx="2" fill="rgba(254,243,199,0.7)" stroke="#d97706" stroke-width="1.2"/>
<text x="492" y="932" fill="#64748b" font-size="9">iOS 仓</text>
<line x1="552" y1="928" x2="582" y2="928" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="590" y="932" fill="#64748b" font-size="9">沉淀（快轨内回写）</text>
<line x1="722" y1="928" x2="752" y2="928" stroke="#059669" stroke-width="1.8"/>
<text x="760" y="932" fill="#64748b" font-size="9">质量通过流转</text>
<line x1="862" y1="928" x2="892" y2="928" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="6,4"/>
<text x="900" y="932" fill="#64748b" font-size="9">质量门（快慢轨边界）</text>

</svg>
